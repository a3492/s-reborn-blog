    * { box-sizing: border-box; margin: 0; padding: 0; }

    }

      color: #666;
      margin-bottom: 40px;
    }

    .filters {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      border: 1px solid #e0d5c8;
    }

    .filter-group {
      margin-bottom: 15px;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1px solid #d0c5b9;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: #155d4b;
      color: #155d4b;
      background: #f0f8f6;
    }

    .filter-btn.active {
      background: #155d4b;
      color: white;
      border-color: #155d4b;
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .article-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e0d5c8;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .article-card:hover {
      border-color: #155d4b;
      box-shadow: 0 8px 24px rgba(21, 93, 75, 0.12);
      transform: translateY(-4px);
    }

    .article-header {
      padding: 24px 20px;
      flex-grow: 1;
    }

    .article-title {

      font-weight: 600;

      line-height: 1.4;

    .article-description {

      color: #666;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: #999;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;

    .difficulty-badge {

      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;

      color: #f57c00;

      color: #c2185b;

      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 12px;
      background: #f0ebe2;
      color: #155d4b;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;

      background: #155d4b;
      color: white;

    let currentDifficulty = null;
    let currentReadTime = null;

    function renderArticles() {
      let filtered = articles;

      if (currentDifficulty) {
        filtered = filtered.filter(a => a.difficulty === currentDifficulty);
      }

      if (currentReadTime) {
        filtered = filtered.filter(a => a.read_time <= currentReadTime);
      }

      const container = document.getElementById('articlesContainer');

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">📭</div>
            <p>일치하는 글이 없습니다.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(article => `
        <a href="/s-reborn-blog/article/${article.slug}.html" class="article-card">
          <div class="article-header">
            <h2 class="article-title">${article.title}</h2>
            <p class="article-description">${article.description}</p>
          </div>
          <div class="article-meta">
            <span class="meta-item">📕 ${article.read_time}분</span>
            <span class="difficulty-badge difficulty-${article.difficulty}">
              ${article.difficulty === 'beginner' ? '초급' : article.difficulty === 'intermediate' ? '중급' : '고급'}
            </span>
          </div>
          <div class="article-tags">
            ${article.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
          </div>
        </a>
      `).join('');
    }

    function filterByDifficulty(level) {
      currentDifficulty = currentDifficulty === level ? null : level;
      renderArticles();
    }

    function filterByReadTime(time) {
      currentReadTime = currentReadTime === time ? null : time;
      renderArticles();
    }

    renderArticles();
