<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="S-Reborn Blog favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="20" y1="20" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 rounded rect -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bg)" />

  <!-- 테두리 accent 라인 -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-opacity="0.5" />

  <!-- AI 느낌의 미세 회로 도트 (장식) -->
  <circle cx="22" cy="22" r="2" fill="#38bdf8" fill-opacity="0.35" />
  <circle cx="106" cy="106" r="2" fill="#6366f1" fill-opacity="0.35" />
  <circle cx="106" cy="22" r="2" fill="#38bdf8" fill-opacity="0.2" />
  <circle cx="22" cy="106" r="2" fill="#6366f1" fill-opacity="0.2" />

  <!-- S 글자 -->
  <text
    x="36"
    y="80"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="90"
    font-weight="900"
    fill="#f1f5f9"
    filter="url(#glow)"
  >S</text>

  <!-- B 글자 (accent gradient) -->
  <text
    x="90"
    y="104"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="90"
    font-weight="900"
    fill="url(#accent)"
    filter="url(#glow)"
  >B</text>
</svg>
