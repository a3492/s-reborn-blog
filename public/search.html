<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검색 | S-Reborn Medical AI</title>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #fbf7f1;
      color: #1d2328;
    }

    header {
      background: white;
      border-bottom: 1px solid #e0d5c8;
      padding: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a {
      text-decoration: none;
      color: #155d4b;
      font-weight: 600;
      font-size: 18px;
    }

    header nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    header nav a {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .search-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      border: 1px solid #e0d5c8;
    }

    .search-input {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      border: 1px solid #d0c5b9;
      border-radius: 8px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: #155d4b;
      box-shadow: 0 0 0 3px rgba(21, 93, 75, 0.1);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .result-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e0d5c8;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      padding: 20px;
    }

    .result-card:hover {
      border-color: #155d4b;
      box-shadow: 0 8px 24px rgba(21, 93, 75, 0.12);
    }

    .result-title {
      font-size: 16px;
      font-weight: 600;
      color: #155d4b;
      margin-bottom: 10px;
    }

    .result-description {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .result-meta {
      font-size: 12px;
      color: #999;
    }

    .result-category {
      display: inline-block;
      background: #f0f8f6;
      color: #155d4b;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    footer {
      background: #f5f0e8;
      padding: 40px 20px;
      text-align: center;
      color: #666;
      border-top: 1px solid #e0d5c8;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/s-reborn-blog/">S-Reborn Medical AI</a>
      <ul>
        <li><a href="/s-reborn-blog/">홈</a></li>
        <li><a href="/s-reborn-blog/category/doctor-ai.html">Doctor AI</a></li>
        <li><a href="/s-reborn-blog/category/ai-news.html">뉴스</a></li>
        <li><a href="/s-reborn-blog/category/ai-tools.html">도구</a></li>
        <li><a href="/s-reborn-blog/category/faq.html">FAQ</a></li>
        <li><a href="/s-reborn-blog/category/tips.html">팁</a></li>
        <li><a href="/s-reborn-blog/category/regulations.html">규제</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 의료 AI에 관해 검색하세요...">
    </div>
    <div class="results" id="resultsContainer"></div>
  </div>

  <footer>
    <p>© 2026 S-Reborn · Medical AI Content Platform</p>
  </footer>

  <script>
    const allArticles = ARTICLES_JSON;
    const fuse = new Fuse(allArticles, {
      keys: ['title', 'description', 'tags'],
      threshold: 0.3
    });

    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('resultsContainer');

    function renderResults(results) {
      if (results.length === 0) {
        resultsContainer.innerHTML = `
          <div class="no-results">
            <p style="font-size: 48px; margin-bottom: 10px;">🔍</p>
            <p>일치하는 글이 없습니다. 다른 검색어를 시도해주세요.</p>
          </div>
        `;
        return;
      }

      resultsContainer.innerHTML = results.map(result => {
        const article = result.item;
        return `
          <a href="/s-reborn-blog/article/${article.slug}.html" class="result-card">
            <div class="result-category">${article.category}</div>
            <h3 class="result-title">${article.title}</h3>
            <p class="result-description">${article.description}</p>
            <div class="result-meta">
              📕 ${article.read_time}분 · 📅 ${article.date}
            </div>
          </a>
        `;
      }).join('');
    }

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.trim();
      if (query.length < 1) {
        resultsContainer.innerHTML = '';
        return;
      }
      const results = fuse.search(query);
      renderResults(results);
    });
  </script>
</body>
</html>
