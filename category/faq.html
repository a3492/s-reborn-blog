  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #fbf7f1;
      color: #1d2328;
      line-height: 1.6;
    }

    header {
      background: white;
      border-bottom: 1px solid #e0d5c8;

      position: sticky;
      top: 0;
      z-index: 100;
    }

    header nav {

    }

      color: #155d4b;
      font-weight: 600;
      font-size: 18px;
    }

    header nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    header nav a {
      font-size: 14px;
      color: #666;
      font-weight: 500;
      transition: color 0.2s;
    }

    header nav a:hover {
      color: #155d4b;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      font-size: 36px;
      margin-bottom: 10px;
      color: #155d4b;
    }

    .page-description {
      font-size: 16px;
      color: #666;
      margin-bottom: 40px;
    }

    .filters {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      border: 1px solid #e0d5c8;
    }

    .filter-group {
      margin-bottom: 15px;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1px solid #d0c5b9;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: #155d4b;
      color: #155d4b;
      background: #f0f8f6;
    }

    .filter-btn.active {
      background: #155d4b;
      color: white;
      border-color: #155d4b;
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .article-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e0d5c8;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .article-card:hover {
      border-color: #155d4b;
      box-shadow: 0 8px 24px rgba(21, 93, 75, 0.12);
      transform: translateY(-4px);
    }

    .article-header {
      padding: 24px 20px;
      flex-grow: 1;
    }

    .article-title {
      font-size: 16px;
      font-weight: 600;
      color: #1d2328;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .article-description {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: #999;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .difficulty-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .difficulty-beginner {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .difficulty-intermediate {
      background: #fff3e0;
      color: #f57c00;
    }

    .difficulty-advanced {
      background: #fce4ec;
      color: #c2185b;
    }

    .article-tags {
      padding: 0 20px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 12px;
      background: #f0ebe2;
      color: #155d4b;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover {
      background: #155d4b;
      color: white;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .no-results-icon {
      font-size: 48px;
      margin-bottom: 16px;

      background: #f5f0e8;
      padding: 40px 20px;
      text-align: center;
      color: #666;
      border-top: 1px solid #e0d5c8;
      margin-top: 60px;

    @media (max-width: 768px) {
      header nav ul {

        gap: 12px;
      }

      }

      .articles-grid {

    let currentDifficulty = null;
    let currentReadTime = null;

    function renderArticles() {
      let filtered = articles;

      if (currentDifficulty) {
        filtered = filtered.filter(a => a.difficulty === currentDifficulty);
      }

      if (currentReadTime) {
        filtered = filtered.filter(a => a.read_time <= currentReadTime);
      }

      const container = document.getElementById('articlesContainer');

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">📭</div>
            <p>일치하는 글이 없습니다.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(article => `
        <a href="/s-reborn-blog/article/${article.slug}.html" class="article-card">
          <div class="article-header">
            <h2 class="article-title">${article.title}</h2>
            <p class="article-description">${article.description}</p>
          </div>
          <div class="article-meta">
            <span class="meta-item">📕 ${article.read_time}분</span>
            <span class="difficulty-badge difficulty-${article.difficulty}">
              ${article.difficulty === 'beginner' ? '초급' : article.difficulty === 'intermediate' ? '중급' : '고급'}
            </span>
          </div>
          <div class="article-tags">
            ${article.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
          </div>
        </a>
      `).join('');
    }

    function filterByDifficulty(level) {
      currentDifficulty = currentDifficulty === level ? null : level;
      renderArticles();
    }

    function filterByReadTime(time) {
      currentReadTime = currentReadTime === time ? null : time;
      renderArticles();
    }

    renderArticles();
